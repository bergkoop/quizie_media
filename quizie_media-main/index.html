<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>main page</title>
    <link rel="stylesheet" href="/quizie_media-main/beroeps beheer/assets/stylesheet/main_page.css">
    <script src="/quizie_media-main/beroeps beheer/assets/script/main_page.js"></script>
</head>
<body>
    <header>
        <h1>QUIZZIE: Mediawijsheid</h1>
        <img src="/quizie_media-main/beroeps beheer/assets/img/logo.png" alt="logo" />
    </header>
    <main>
        <section class="introduction">
            <p>Welcome to QUIZZIE! Learn about media safety and test your knowledge with our interactive quizzes.</p>
        </section>
<section class="navigation-grid">
            <a href="/quizie_media-main/beroeps beheer/quizzes/member-1-online_communicatie/question1.html" class="card">Online Communicatie</a>
            <a href="/quizie_media-main/quizzes/member-2-media_veiligheid/member2.html" class="card">Mediaveiligheid</a>
            <a href="/quizie_media-main/quizzes/member-3-third_topic/quiz3.html" class="card">[Third Topic]</a>
        </section>
        <section id="score-section" class="score-section" style="text-align: center; padding: 1rem; background: #f0f0f0; margin: 1rem 0;">
            <h3>Je score Online Communicatie: <span id="online-score">Nog niet gespeeld</span></h3>
        </section>
    </main>
    <div id="welcome-overlay" class="overlay">
        <div class="login-box">
            <h2>Welkom bij QUIZZIE</h2>
            <input type="text" id="username" placeholder="Voer uw naam in" />
            <button id="start-button">Start</button>
            <button id="gast">doe als gast</button>
        </div>
    </div>
    <footer>
        <a class="teampage" href="/quizie_media-main/team.html">Teampagina</a>
    </footer>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const score = localStorage.getItem('score_online_communicatie');
        if (score !== null) {
            document.getElementById('online-score').textContent = score;
        }
    });
</script>
</body>
</html>
